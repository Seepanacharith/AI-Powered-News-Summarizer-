name: Daily News Scraper

on:
  schedule:
    # Runs every day at 18:30 UTC (which is 12:00 AM IST)
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 transformers torch --no-cache-dir

    - name: Run news scraper
      run: |
        python Server/news-scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add Server/news.json
        # Only commit and push if there are changes in news.json
        git diff-index --quiet HEAD || git commit -m "Auto-update news data" && git push
